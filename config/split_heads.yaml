# split-heads 配置：bbox 走扩散(MSE)，class 走 CE，objectness 走 BCE。
# 与 default.yaml 数据契约一致，只把 split_heads 打开并加 CE/BCE 权重。
#
# 用法：
#   python train.py config/split_heads.yaml runs/split
#   python train.py config/split_heads.yaml runs/split --max_steps 1   # 冒烟

data:
  dataset_type: cached_buildingBlocks
  encoding_type: cached_diffusion_cosin_angle_wocm_prmAll
  dataset_directory: ../BoxCenterSizeLabelNp
  annotation_file: ../dataset/building_splits.csv
  train_stats: dataset_stats.txt
  max_length: 128
  pad_zero: true
  augmentations: null

network:
  type: diffusion_scene_layout_ddpm
  net_type: dit_adaln
  point_dim: 22        # bbox_dim(8) + class_dim(14)；split 模式下 class 不进扩散张量，仅用于推导监督目标
  class_dim: 14
  translation_dim: 3
  size_dim: 3
  angle_dim: 2
  sample_num_points: 128
  loss_iou_mode: overlap_ratio
  size_half: false
  split_heads: true      # 启用三头
  lambda_class: 1.0      # class CE 权重
  lambda_obj: 1.0        # objectness BCE 权重
  loss_validity: true    # size 越界惩罚 + angle 单位化正则
  lambda_size_valid: 1.0
  lambda_angle_norm: 1.0

  diffusion_kwargs:
    schedule_type: linear
    beta_start: 0.0001
    beta_end: 0.02
    time_num: 1000
    loss_type: mse
    model_mean_type: v
    model_var_type: fixedsmall
    loss_iou: true
    loss_separate: true

  net_kwargs:
    dim: 512
    width: 512
    n_ctx: 128
    channels: 22
    class_dim: 14
    translation_dim: 3
    size_dim: 3
    angle_dim: 2
    context_dim: 0
    layers: 12
    seperate_all: true
    pos_embeding_way: learned
    size_half: false

training:
  splits: [train, val]
  epochs: 100000
  steps_per_epoch: 500
  batch_size: 64
  save_frequency: 1000
  optimizer: Adam
  lr: 0.0002
  weight_decay: 0.0
  schedule: step
  lr_step: 10000
  lr_decay: 0.5
  max_grad_norm: 10

validation:
  splits: [test]
  frequency: 1000
  batch_size: 1

logger:
  project: BuildingDiffusion
